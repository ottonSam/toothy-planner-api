spring.application.name=toothy-planner-api-test

spring.datasource.url=jdbc:h2:mem:toothy_planner_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

minio.endpoint=http://localhost:9000
minio.access-key=test
minio.secret-key=test
minio.bucket=test

app.jwt.secret=test-secret-with-enough-size-for-hmac
app.jwt.issuer=toothy-planner-api-test
